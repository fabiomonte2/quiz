<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<title>Resultado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="quiz-card text-center">

        <h1 class="mb-4">
            🎯 Resultado Final
        </h1>

        <div class="resultado-circle">

            {{ percentual }}%

        </div>

        <h2 class="mt-4">
            {{ pontuacao }} de {{ total }} acertos
        </h2>

        <h1 class="medalha mt-4">
            {{ medalha }}
        </h1>

        <a href="/"
           class="btn btn-primary btn-lg mt-4">

            Jogar Novamente

        </a>

    </div>

</div>

</body>
</html>
