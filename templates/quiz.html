<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="quiz-card">

        <div class="d-flex justify-content-between">

            <h5>
                Questão {{ numero }} de {{ total }}
            </h5>

            <span class="badge bg-warning text-dark">
                ⏳ 60s
            </span>

        </div>

        <div class="progress mt-3 mb-4">

            <div class="progress-bar progress-bar-striped progress-bar-animated"
                 style="width: {{ progresso }}%">
                {{ progresso }}%
            </div>

        </div>

        <h3 class="mb-4">
            {{ questao.pergunta }}
        </h3>

        <form method="POST">

            {% for chave, valor in questao.opcoes.items() %}

            <div class="form-check alternativa">

                <input class="form-check-input"
                       type="radio"
                       name="resposta"
                       value="{{ chave }}"
                       required>

                <label class="form-check-label">

                    <strong>{{ chave }})</strong>
                    {{ valor }}

                </label>

            </div>

            {% endfor %}

            <div class="text-center">

                <button class="btn btn-success btn-lg mt-4">
                    Responder
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
